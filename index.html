<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeboah Pendulum Rig Simulator</title>
    <!-- Load React, Tailwind, and Lucide Icons via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function YeboahSimulator() {
            const [mass, setMass] = useState(2.0);
            const [angle, setAngle] = useState(45);
            const L = 1.0; // Length in meters
            const g = 9.81;

            // Calculations
            const radians = (angle * Math.PI) / 180;
            const height = L * (1 - Math.cos(radians));
            const energy = mass * g * height;
            const velocity = Math.sqrt(2 * g * height);

            return (
                <div className="p-8 max-w-4xl mx-auto bg-gray-50 min-h-screen font-sans">
                    <header className="mb-8 border-b pb-4">
                        <h1 className="text-3xl font-bold text-slate-800">Yeboah Pendulum Rig v1.0</h1>
                        <p className="text-slate-600 italic">Digital Twin for Impact Energy Validation</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Controls */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                            <h2 className="text-xl font-semibold mb-4">Parameters</h2>
                            
                            <div className="mb-6">
                                <label className="block text-sm font-medium mb-2">Tool Mass (m): {mass} kg</label>
                                <input type="range" min="0.5" max="10" step="0.1" value={mass} 
                                    onChange={(e) => setMass(parseFloat(e.target.value))}
                                    className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer" />
                            </div>

                            <div className="mb-6">
                                <label className="block text-sm font-medium mb-2">Release Angle (θ): {angle}°</label>
                                <input type="range" min="0" max="90" step="1" value={angle} 
                                    onChange={(e) => setAngle(parseFloat(e.target.value))}
                                    className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer" />
                            </div>
                        </div>

                        {/* Results */}
                        <div className="bg-blue-900 text-white p-6 rounded-xl shadow-lg">
                            <h2 className="text-xl font-semibold mb-4 text-blue-200">Calculated Outputs</h2>
                            <div className="space-y-4">
                                <div>
                                    <p className="text-sm text-blue-300">Impact Energy (Eₖ)</p>
                                    <p className="text-4xl font-mono font-bold">{energy.toFixed(2)} J</p>
                                </div>
                                <div>
                                    <p className="text-sm text-blue-300">Impact Velocity (v)</p>
                                    <p className="text-2xl font-mono">{velocity.toFixed(2)} m/s</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-12 text-center text-gray-400 text-sm">
                        <p>Governing Equation: Eₖ = mgL(1 - cosθ)</p>
                        <p>© 2024 Yeboah Research Lab</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<YeboahSimulator />);
    </script>
</body>
</html>
